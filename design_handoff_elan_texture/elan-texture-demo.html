<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Élan texture — standalone reference</title>
<link rel="stylesheet" href="elan-texture.css" />
<style>
  /* --- demo-only styling, NOT part of the texture --- */
  *{box-sizing:border-box;}
  body{margin:0;font-family:system-ui,sans-serif;background:#0d1d3b;}
  .demo{padding:96px 7vw 110px;color:#f3f1ea;}
  .eyebrow{font-size:12px;letter-spacing:.30em;text-transform:uppercase;color:#c2a25c;margin:0 0 18px;}
  h1{font-family:Georgia,serif;font-weight:500;font-size:46px;line-height:1.05;margin:0 0 18px;max-width:16ch;}
  p{color:#b9c2d4;font-size:16px;line-height:1.55;max-width:46ch;margin:0;}
  .row{display:flex;gap:20px;margin-top:54px;}
  .box{flex:1;min-height:160px;border:1px solid rgba(255,255,255,.10);border-radius:6px;
       background:linear-gradient(160deg,rgba(255,255,255,.055),rgba(255,255,255,0));}
</style>
</head>
<body>
  <!-- Apply the texture by adding class="elan-bg" to your section. -->
  <section class="elan-bg demo">
    <p class="eyebrow">Référence texture · « Élan »</p>
    <h1>Le fond « Élan » appliqué à une section.</h1>
    <p>Halo doré en haut à droite + courbes ascendantes rappelant la flèche du logo. La texture s'adapte à toute largeur (background-size: cover).</p>
    <div class="row"><div class="box"></div><div class="box"></div><div class="box"></div></div>
  </section>
</body>
</html>
