<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Section Conviction — Direction A</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#11254a;
    --gold:#bf9d54;
    --gold-soft:#cdb077;
    --cream:#e9e3d5;
    --cream-hi:#efeadd;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Archivo',system-ui,sans-serif;background:var(--cream);}

  /* ============ Section Conviction — Direction A (Éditorial asymétrique) ============ */
  .conviction{
    position:relative;overflow:hidden;
    background:radial-gradient(140% 120% at 12% 0%, var(--cream-hi) 0%, var(--cream) 58%, #e3dccd 100%);
    display:flex;align-items:center;
    min-height:500px;
    padding:72px 96px;
  }
  .conviction .rule{
    position:absolute;left:96px;top:50%;transform:translateY(-50%);
    width:2px;height:190px;
    background:linear-gradient(var(--gold-soft),var(--gold),rgba(191,157,84,0));
  }
  .conviction .inner{position:relative;z-index:1;padding-left:56px;max-width:880px;}
  .conviction .mark{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:120px;line-height:.6;color:var(--gold);
    display:block;height:54px;margin:0 0 6px -6px;
  }
  .conviction .eyebrow{
    font-family:'Archivo',sans-serif;font-size:12px;font-weight:600;
    letter-spacing:.34em;text-transform:uppercase;color:var(--gold);
    margin:0 0 22px;
  }
  .conviction blockquote{
    margin:0;font-family:'Cormorant Garamond',serif;font-weight:500;
    font-size:44px;line-height:1.18;color:var(--navy);letter-spacing:.004em;
    text-wrap:balance;
  }
  .conviction blockquote em{font-style:italic;color:var(--gold);font-weight:500;}
  .conviction .foot{display:flex;align-items:center;gap:24px;margin-top:34px;}
  .conviction .foot .line{height:1px;width:46px;background:var(--gold);opacity:.55;}
  .conviction .cta{
    margin-left:auto;display:inline-flex;align-items:center;gap:12px;
    font-family:'Archivo',sans-serif;font-size:13.5px;font-weight:600;
    letter-spacing:.04em;color:var(--navy);text-decoration:none;white-space:nowrap;
    border-bottom:1.5px solid var(--gold);padding-bottom:5px;transition:color .25s;
  }
  .conviction .cta svg{transition:transform .25s;}
  .conviction .cta:hover{color:var(--gold);}
  .conviction .cta:hover svg{transform:translateX(5px);}
  .conviction .monogram{
    position:absolute;right:-60px;bottom:-90px;width:430px;opacity:.05;
    pointer-events:none;
  }

  /* ---- Mobile (≤640px) ---- */
  @media (max-width:640px){
    .conviction{padding:52px 30px;min-height:0;}
    .conviction .rule{left:30px;top:52px;bottom:52px;height:auto;transform:none;}
    .conviction .inner{padding-left:30px;}
    .conviction .mark{font-size:80px;height:36px;margin-bottom:8px;}
    .conviction .eyebrow{font-size:10.5px;letter-spacing:.26em;margin-bottom:18px;}
    .conviction blockquote{font-size:30px;line-height:1.24;}
    .conviction .foot{flex-direction:column;align-items:flex-start;gap:20px;margin-top:30px;}
    .conviction .foot .line{width:40px;}
    .conviction .cta{margin-left:0;}
    .conviction .monogram{right:-70px;bottom:-70px;width:230px;}
  }
</style>
</head>
<body>

<section class="conviction" data-screen-label="Conviction">
  <div class="rule"></div>
  <div class="inner">
    <span class="mark">&ldquo;</span>
    <p class="eyebrow">La conviction d'Élan Patrimoine</p>
    <blockquote>Conseiller, ce n'est pas suivre une mode&nbsp;: c'est <em>protéger un projet de vie</em> contre l'imprévu et le temps.</blockquote>
    <div class="foot">
      <span class="line"></span>
      <a class="cta" href="#">Notre méthode
        <svg width="20" height="11" viewBox="0 0 20 11" fill="none"><path d="M1 5.5h17M13.5 1l4.5 4.5-4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>
  </div>
  <img class="monogram" src="assets/logo-gold.png" alt="" />
</section>

</body>
</html>
