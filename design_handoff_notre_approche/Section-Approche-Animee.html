<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Notre approche — animé</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Spectral:wght@400;500;600&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#11254a;
    --navy-deep:#0d1d3b;
    --navy-hi:#17305c;
    --gold:#c2a25c;
    --gold-soft:#d8bd84;
    --ink-100:#f3f1ea;
    --ink-300:#b9c2d4;
    --ink-500:#8893a8;
    --line:rgba(255,255,255,0.10);
    --gold-line:rgba(194,162,92,0.34);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Archivo',system-ui,sans-serif;background:var(--navy-deep);color:var(--ink-100);-webkit-font-smoothing:antialiased;padding-bottom:84px;}

  .frame{container-type:inline-size;width:100%;margin:0 auto;transition:width .35s ease;}
  .frame.mobile{margin:30px auto;border-radius:34px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5);outline:8px solid #05101f;}

  .section{
    position:relative;overflow:hidden;
    background:
      radial-gradient(120% 120% at 100% 0%, #1c3868 0%, rgba(28,56,104,0) 46%),
      linear-gradient(150deg,var(--navy) 0%,var(--navy-deep) 100%);
    padding:104px 0 112px;
  }
  .section::before{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1.4px);
    background-size:24px 24px;
    -webkit-mask-image:linear-gradient(120deg,#000 0%,transparent 62%);
            mask-image:linear-gradient(120deg,#000 0%,transparent 62%);
  }
  .wrap{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:0 56px;
    display:grid;grid-template-columns:0.82fr 1.18fr;column-gap:84px;align-items:center;}

  /* ---------- reveal keyframes (base state is VISIBLE; animation plays from hidden) ---------- */
  @keyframes appear{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  @keyframes growLine{from{transform:scaleX(0);}to{transform:scaleX(1);}}

  /* ---------- aside (left) ---------- */
  .aside{max-width:42ch;}
  .eyebrow{display:flex;align-items:center;gap:16px;margin:0 0 24px;white-space:nowrap;
    font-size:12px;font-weight:600;letter-spacing:.30em;text-transform:uppercase;color:var(--gold);}
  .eyebrow::before{content:"";width:42px;height:1.5px;background:var(--gold);display:block;flex:none;transform-origin:left;}
  .title{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:50px;line-height:1.06;
    margin:0;color:var(--ink-100);letter-spacing:.005em;text-wrap:balance;}
  .sub{font-family:'Spectral',serif;font-size:18px;line-height:1.55;color:var(--ink-300);
    margin:22px 0 40px;text-wrap:pretty;}
  .cta{display:inline-flex;align-items:center;gap:13px;font-family:'Archivo',sans-serif;
    font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-100);
    text-decoration:none;padding-bottom:7px;border-bottom:1.5px solid var(--gold);
    transition:color .25s;white-space:nowrap;}
  .cta:hover{color:var(--gold-soft);}
  .cta .arrow{transition:transform .28s cubic-bezier(.22,.61,.36,1);}
  .cta:hover .arrow{transform:translateX(5px);}

  /* play state: re-run the entrance from hidden, staggered */
  .play .eyebrow{animation:appear .7s cubic-bezier(.22,.61,.36,1) both;}
  .play .eyebrow::before{animation:growLine .8s cubic-bezier(.22,.61,.36,1) .15s both;}
  .play .title{animation:appear .8s cubic-bezier(.22,.61,.36,1) .08s both;}
  .play .sub{animation:appear .8s cubic-bezier(.22,.61,.36,1) .16s both;}
  .play .cta{animation:appear .8s cubic-bezier(.22,.61,.36,1) .24s both;}

  /* ---------- rows (right) ---------- */
  .rows{position:relative;display:flex;flex-direction:column;}
  .row{position:relative;display:grid;grid-template-columns:auto 1fr;column-gap:34px;align-items:baseline;
    padding:30px 14px 30px 0;border-top:1px solid var(--line);transition:padding-left .3s;}
  .play .row{animation:appear .8s cubic-bezier(.22,.61,.36,1) both;}
  .row:last-child{border-bottom:1px solid var(--line);}
  .row .n{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:60px;line-height:.8;
    color:transparent;-webkit-text-stroke:1px rgba(194,162,92,.55);font-feature-settings:"onum" 1;
    transition:color .35s, -webkit-text-stroke-color .35s;}
  .row .stitle{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:27px;margin:0 0 7px;letter-spacing:.004em;}
  .row .stext{font-family:'Archivo',sans-serif;font-size:15px;line-height:1.6;color:var(--ink-300);margin:0;max-width:52ch;}
  .row::after{content:"";position:absolute;left:0;top:-1px;height:calc(100% + 1px);width:2px;
    background:linear-gradient(180deg,var(--gold),var(--gold-soft));transform:scaleY(0);transform-origin:top;
    transition:transform .4s cubic-bezier(.22,.61,.36,1);}
  .row:hover{padding-left:22px;}
  .row:hover::after{transform:scaleY(1);}
  .row:hover .n{color:var(--gold);-webkit-text-stroke-color:transparent;}

  /* ---------- mobile / narrow ---------- */
  @container (max-width:860px){
    .section{padding:58px 0 64px;}
    .wrap{grid-template-columns:1fr;column-gap:0;row-gap:40px;padding:0 26px;align-items:start;}
    .aside{max-width:none;}
    .eyebrow{font-size:10.5px;letter-spacing:.24em;margin-bottom:18px;}
    .eyebrow::before{width:30px;}
    .title{font-size:32px;line-height:1.08;}
    .sub{font-size:16px;margin:14px 0 26px;}
    .cta{font-size:12px;}
    .row{column-gap:22px;padding:24px 4px 24px 0;}
    .row .n{font-size:46px;}
    .row .stitle{font-size:23px;}
    .row .stext{font-size:14px;line-height:1.55;}
    .row:hover{padding-left:0;}
    .row::after{display:none;}
    .row .n{color:var(--gold);-webkit-text-stroke-color:transparent;opacity:.85;}
  }

  /* ---------- toolbar ---------- */
  .picker{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:50;
    display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:center;
    padding:9px 12px;border-radius:14px;max-width:96vw;
    background:rgba(10,18,36,.85);border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(14px);box-shadow:0 16px 40px rgba(0,0,0,.45);}
  .picker .lab{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8b95ab;padding:0 6px 0 4px;}
  .picker button{font-family:'Archivo',sans-serif;font-size:12px;color:#cdd4e2;cursor:pointer;
    padding:7px 12px;border-radius:8px;border:1px solid transparent;background:transparent;transition:.18s;white-space:nowrap;}
  .picker button:hover{background:rgba(255,255,255,.06);color:#fff;}
  .picker button.on{background:var(--gold);color:#1a1305;border-color:var(--gold);font-weight:600;}
  .picker .sep{width:1px;height:22px;background:rgba(255,255,255,.14);margin:0 5px;}
  .picker .replay{display:inline-flex;align-items:center;gap:7px;color:#e7d8b0;border:1px solid rgba(194,162,92,.4);}
  .picker .replay:hover{background:rgba(194,162,92,.12);color:#fff;}
  .picker .replay svg{width:13px;height:13px;}

  @media (prefers-reduced-motion: reduce){
    .play .eyebrow,.play .eyebrow::before,.play .title,.play .sub,.play .cta,.play .row{animation:none !important;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STEPS = [
  {n:'01', t:'Diagnostic',     d:"Un audit complet de votre situation patrimoniale, fiscale et familiale, à l'écoute de vos objectifs."},
  {n:'02', t:'Stratégie',      d:"L'élaboration d'une feuille de route sur mesure, chiffrée et hiérarchisée selon vos priorités."},
  {n:'03', t:'Mise en œuvre',  d:"Le déploiement des solutions retenues et un suivi régulier pour ajuster le cap dans la durée."},
];
const STAGGER = 150;

const Arrow = () => (
  <svg className="arrow" width="20" height="11" viewBox="0 0 20 11" fill="none" aria-hidden="true">
    <path d="M1 5.5h17M13.5 1l4.5 4.5-4.5 4.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

// (replay handled by useReplay above)

// adds `play` class on the section, re-triggering the CSS entrance animations.
// toggles off->on so the animation restarts even if already played.
function useReplay(){
  const ref = useRef(null);
  const play = React.useCallback(()=>{
    const el = ref.current; if(!el) return;
    el.classList.remove('play'); void el.offsetWidth; el.classList.add('play');
  },[]);
  return [ref, play];
}

function App(){
  const [mobile,setMobile] = useState(false);
  const [sectionRef, play] = useReplay();

  // play once on mount, then replay whenever the section re-enters the viewport
  useEffect(()=>{
    const el = sectionRef.current; if(!el) return;
    play();
    if(!('IntersectionObserver' in window)) return;
    let seen = true;
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting && !seen){ seen=true; play(); }
        else if(!e.isIntersecting){ seen=false; }
      });
    }, {threshold:0.35});
    io.observe(el);
    return ()=>io.disconnect();
  },[mobile]);

  return (
    <>
      <div className={"frame"+(mobile?" mobile":"")} style={{width: mobile?'402px':'100%'}}>
        <section className="section" ref={sectionRef}>
          <div className="wrap">
            <div className="aside">
              <p className="eyebrow">Notre approche</p>
              <h2 className="title">Une méthode rigoureuse en trois temps</h2>
              <p className="sub">De l'écoute à la mise en œuvre, un chemin clair et maîtrisé — un seul interlocuteur, à chaque étape.</p>
              <a className="cta" href="#">Découvrir notre approche <Arrow/></a>
            </div>
            <div className="rows">
              {STEPS.map((s,i)=>(
                <div className="row" key={s.n} style={{animationDelay:(i*STAGGER+120)+'ms'}}>
                  <span className="n">{s.n}</span>
                  <div className="body">
                    <h3 className="stitle">{s.t}</h3>
                    <p className="stext">{s.d}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      </div>

      <div className="picker">
        <button className="replay" onClick={play}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
          Rejouer
        </button>
        <span className="sep"></span>
        <span className="lab">Aperçu</span>
        <button className={!mobile?'on':''} onClick={()=>setMobile(false)}>Desktop</button>
        <button className={mobile?'on':''} onClick={()=>setMobile(true)}>Mobile</button>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
